{% extends "base.html" %}

{% block extra_css %}
<style>
    .form-container {
        max-width: 600px;
    }

    .button-group {
        display: flex;
        gap: 10px;
        margin-top: 30px;
    }

    .btn-submit {
        flex: 1;
        padding: 12px 24px;
        background-color: var(--success);
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        font-size: 16px;
        cursor: pointer;
    }

    .btn-submit:hover {
        background-color: var(--success-dark);
    }

    .btn-cancel {
        flex: 1;
        padding: 12px 24px;
        background-color: #6c757d;
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        font-size: 16px;
        cursor: pointer;
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .btn-cancel:hover {
        background-color: #5a6268;
    }

    @media (max-width: 576px) {
        .button-group {
            flex-direction: column;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="form-container">
    <h1>+ Добавить блюдо</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for category, message in messages %}
    <div class="alert alert-{{ category }}">
        {{ message }}
    </div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('admin_add') }}" enctype="multipart/form-data">
        <div class="form-group">
            <label class="form-label">Название блюда *</label>
            <input type="text" name="name" class="form-control" placeholder="Паста Болоньезе" required>
        </div>

        <div class="form-group">
            <label class="form-label">Описание *</label>
            <textarea name="description" class="form-control-textarea" placeholder="Описание блюда" required></textarea>
        </div>

        <div class="form-group">
            <label class="form-label">Цена (₽) *</label>
            <input type="number" name="price" class="form-control" placeholder="520" required>
        </div>

        <div class="form-group">
            <label class="form-label">Картинка (JPG/PNG)</label>
            <label class="file-input-label">
                Выберите файл
                <input type="file" name="image" accept="image/*" onchange="updateFileName(this)">
            </label>
            <div class="file-name" id="file-name"></div>
        </div>
        <div class="form-group">
            <label class="form-label">Категория *</label>
            <select name="category" class="form-control" required>
                <option value="salads">🥗 Салаты</option>
                <option value="soups">🥣 Супы</option>
                <option value="mains" selected>🥩 Горячее</option>
                <option value="desserts">🍰 Десерты</option>
                <option value="drinks">🥤 Напитки</option>
            </select>
        </div>
        <div class="button-group">
            <button type="submit" class="btn-submit">Добавить</button>
            <a href="{{ url_for('admin') }}" class="btn-cancel">Отмена</a>
        </div>
    </form>
</div>

<script>
    function updateFileName(input) {
        const fileName = input.files[0]?.name || '';
        document.getElementById('file-name').textContent = fileName ? '✅ ' + fileName : '';
    }
</script>
{% endblock %}

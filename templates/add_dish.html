{% extends "base.html" %}

{% block extra_css %}
<style>
.form-container {
    max-width: 640px;
    margin: 0 auto;
}

.button-group {
    display: flex;
    gap: 12px;
    margin-top: 24px;
}

.btn-submit,
.btn-cancel {
    flex: 1;
    padding: 12px 20px;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 500;
    border: none;
    cursor: pointer;
    text-align: center;
}

.btn-submit {
    background-color: #28a745;
    color: #fff;
}

.btn-submit:hover {
    background-color: #218838;
}

.btn-cancel {
    background-color: #6c757d;
    color: #fff;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
}

.btn-cancel:hover {
    background-color: #5a6268;
}

@media (max-width: 576px) {
    .button-group {
        flex-direction: column;
    }
}
</style>
{% endblock %}

{% block content %}
<div class="form-container">
    <h1>Добавить блюдо</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('admin_add') }}" enctype="multipart/form-data">
        <div class="form-group">
            <label class="form-label">Название блюда *</label>
            <input type="text" name="name" class="form-control" placeholder="Паста Болоньезе" required>
        </div>

        <div class="form-group">
            <label class="form-label">Описание *</label>
            <textarea name="description" class="form-control-textarea" placeholder="Описание блюда" required></textarea>
        </div>

        <div class="form-group">
            <label class="form-label">Цена (₽) *</label>
            <input type="number" name="price" class="form-control" placeholder="520" required>
        </div>

        <div class="form-group">
            <label class="form-label">Картинка</label>
            <label class="file-input-label">
                Выбрать файл
                <input type="file" name="image" accept="image/*" onchange="showFileName(this)">
            </label>
            <div id="file-name" class="file-name"></div>
        </div>

        <div class="form-group">
            <label class="form-label">Категория *</label>
            <select name="category" class="form-control" required>
                <option value="salads">Салаты</option>
                <option value="soups">Супы</option>
                <option value="mains" selected>Горячее</option>
                <option value="desserts">Десерты</option>
                <option value="drinks">Напитки</option>
            </select>
        </div>

        <div class="button-group">
            <button type="submit" class="btn-submit">Сохранить</button>
            <a href="{{ url_for('admin') }}" class="btn-cancel">Отмена</a>
        </div>
    </form>
</div>

<script>
function showFileName(input) {
    const fileNameBlock = document.getElementById('file-name');
    if (input.files.length > 0) {
        fileNameBlock.textContent = input.files[0].name;
    } else {
        fileNameBlock.textContent = '';
    }
}
</script>
{% endblock %}

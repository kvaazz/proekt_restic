{% extends "base.html" %}

{% block extra_css %}
<style>
    html, body {
        height: 100%;
        overflow: hidden;
    }

    body {
        background: url('{{ url_for("static", filename="img/restaurant-interior.jpg") }}') center/cover no-repeat;
        background-attachment: fixed;
    }

    main {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 !important;
        margin: 0 !important;
        min-height: 100vh;
    }

    .hero-container {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .hero-container::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.4);
        z-index: 1;
    }

    .restaurant-name {
        position: relative;
        z-index: 2;
        text-align: center;
        margin-top: -150px;
    }

    .restaurant-name h1 {
        font-size: 150px;
        color: white;
        text-shadow: 3px 3px 10px rgba(0, 0, 0, 0.8);
        margin: 0;
        font-weight: bold;
        letter-spacing: 5px;
    }

    @media (max-width: 991px) {
        .restaurant-name h1 {
            font-size: 80px;
        }
    }

    @media (max-width: 576px) {
        .restaurant-name h1 {
            font-size: 60px;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="hero-container">
    <div class="restaurant-name">
        <h1>TIMMI</h1>
    </div>
</div>
{% endblock %}

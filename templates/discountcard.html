{% extends "base.html" %}

{% block extra_css %}
<style>
.discount-card-container {
    max-width: 600px;
    margin: 0 auto;
    background: #fff;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
}

.card-image-wrapper {
    text-align: center;
    margin-bottom: 20px;
}

.card-image-wrapper img {
    width: 100%;
    max-width: 480px;
    height: auto;
    border-radius: 8px;
}

.button-group {
    display: flex;
    justify-content: center;
    margin-top: 20px;
}

.btn-download {
    padding: 12px 24px;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 500;
    text-decoration: none;
    background: #28a745;
    color: #fff;
    transition: background 0.2s ease;
}

.btn-download:hover {
    background: #218838;
}

@media (max-width: 576px) {
    .discount-card-container {
        padding: 20px 15px;
    }

    .btn-download {
        width: 100%;
        text-align: center;
    }
}
</style>
{% endblock %}

{% block content %}
<div class="discount-card-container">
    <div class="card-image-wrapper">
        <img src="{{ url_for('static', filename=card_image) }}" alt="Скидочная карта">
    </div>

    <div class="button-group">
        <a href="{{ url_for('static', filename=card_image) }}" download class="btn-download">
            Скачать карту
        </a>
    </div>
</div>
{% endblock %}
